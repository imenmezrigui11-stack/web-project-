            },
          ],
        },
      ];

      const Header = ({ setCurrentPage }) => (
        <header className="bg-gradient-to-r from-blue-700 to-teal-500 text-white py-4 fixed w-full top-0 z-10 shadow-lg">
          <div className="container mx-auto flex justify-between items-center px-4">
            <h1 className="text-3xl font-extrabold tracking-tight">Le Quai</h1>
            <nav className="space-x-4">
              <button
                onClick={() => setCurrentPage("home")}
                className="px-4 py-2 rounded-full hover:bg-white hover:text-blue-700 transition"
              >
                Accueil
              </button>
              <button
                onClick={() => setCurrentPage("menu")}
                className="px-4 py-2 rounded-full hover:bg-white hover:text-blue-700 transition"
              >
                Menu
              </button>
              <button
                onClick={() => setCurrentPage("reservation")}
                className="px-4 py-2 rounded-full hover:bg-white hover:text-blue-700 transition"
              >
                Réservation
              </button>
            </nav>
          </div>
        </header>
      );

      const Home = () => (
        <section id="home" className="pt-24 pb-12">
          <div className="container mx-auto px-4">
            <h2 className="text-4xl font-extrabold text-center mb-8 section-title">
              Bienvenue au Restaurant Le Quai
            </h2>
            <p className="text-lg text-center mb-8 text-gray-800 max-w-2xl mx-auto">
              Niché au cœur de la marina de Bizerte, Le Quai vous invite à une
              expérience culinaire vibrante où les saveurs tunisiennes et
              italiennes dansent ensemble. Savourez des plats frais et locaux,
              préparés par notre chef Hichem Ben Ammar, tout en admirant la vue
              sur le port.
            </p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
              <div className="card rounded-xl overflow-hidden">
                <img
                  src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRGHLugh0VSct9zypabwrVorJSdleL1HhavAA&s"
                  alt="Restaurant"
                  className="w-full h-48 object-cover"
                />
              </div>
              <div className="card rounded-xl overflow-hidden">
                <img
                  src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPj7AVDFmnfuybYFhKDGF5bMwS_GrhFNYmAQ&s"
                  alt="Plat"
                  className="w-full h-48 object-cover"
                />
              </div>
              <div className="card rounded-xl overflow-hidden">
                <img
                  src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRA0DkhSI_CYKBumHjtD0LX0i0hyXu9O9hEdw&s"
                  alt="Marina"
                  className="w-full h-48 object-cover"
                />
              </div>
            </div>
            <div className="text-center bg-white bg-opacity-80 p-6 rounded-xl shadow-lg">
              <h3 className="text-2xl font-semibold mb-4 text-blue-800">
                Informations pratiques
              </h3>
              <p className="text-gray-700">
                <strong>Localisation :</strong> Marina de Bizerte, Bizerte,
                Tunisie
              </p>
              <p className="text-gray-700">
                <strong>Horaires :</strong> Ouvert tous les jours de 8h00 à
                00h00
              </p>
              <p className="text-gray-700">
                <strong>Chef :</strong> Hichem Ben Ammar - Spécialiste des
                cuisines tunisienne et italienne
              </p>
            </div>
          </div>
        </section>
      );

      const Menu = ({ addToCart }) => (
        <section id="menu" className="pt-24 pb-12 min-h-screen">
          <div className="container mx-auto px-4">
            <h2 className="text-4xl font-extrabold text-center mb-8 section-title">
              Notre Menu
            </h2>
            {menuItems.map((category, index) => (
              <div key={index} className="mb-12">
                <h3 className="text-3xl font-semibold mb-6 text-blue-800">
                  {category.category}
                </h3>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  {category.items.map((item) => (
                    <div
                      key={item.id}
                      className="card rounded-xl p-4 flex flex-col"
                    >
                      <img
                        src={item.image}
                        alt={item.name}
                        className="w-full h-40 object-cover rounded-lg mb-4"
                      />
                      <div className="flex-1">
                        <h4 className="text-xl font-bold text-gray-800">
                          {item.name}
                        </h4>
                        <p className="text-sm text-gray-600">
                          {item.ingredients}
                        </p>
                        <p className="text-lg font-semibold text-blue-700">
                          {item.price} TND
                        </p>
                      </div>
                      <button
                        onClick={() => addToCart(item)}
                        className="btn-primary text-white px-4 py-2 rounded-lg mt-4"
                      >
                        Ajouter au panier
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </section>
      );

      const Cart = ({
        cart,
        removeFromCart,
        user,
        setShowAuthModal,
        submitOrder,
      }) => (
        <section className="py-12">
          <div className="container mx-auto px-4">
            <h2 className="text-4xl font-extrabold text-center mb-8 section-title">
              Votre Panier
            </h2>
            <div className="card p-6 rounded-xl">
              {cart.length === 0 ? (
                <p className="text-center text-gray-700">
                  Votre panier est vide.
                </p>
              ) : (
                <div>
                  {cart.map((item, index) => (
                    <div
                      key={index}
                      className="flex justify-between border-b py-2 text-gray-800"
                    >
                      <span>
                        {item.name} - {item.price} TND
                      </span>
                      <button
                        onClick={() => removeFromCart(index)}
                        className="text-red-500 hover:text-red-700 transition"
                      >
                        Supprimer
                      </button>
                    </div>
                  ))}
                  <p className="text-lg font-bold mt-4 text-blue-700">
                    Total: {cart.reduce((sum, item) => sum + item.price, 0)} TND
                  </p>
                  {user ? (
                    <button
                      onClick={submitOrder}
                      className="btn-primary text-white px-6 py-3 rounded-lg mt-4"
                    >
                      Passer la commande
                    </button>
                  ) : (
                    <button
                      onClick={() => setShowAuthModal(true)}
                      className="btn-primary text-white px-6 py-3 rounded-lg mt-4"
                    >
                      Connectez-vous pour commander
                    </button>
                  )}
                </div>
              )}
            </div>
          </div>
        </section>
      );

      const Reservation = () => {
        const [formData, setFormData] = useState({
          name: "",
          date: "",
          time: "",
          guests: 1,
        });
        const [message, setMessage] = useState("");

        const handleChange = (e) => {
          setFormData({ ...formData, [e.target.name]: e.target.value });
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          setMessage(
            "Réservation confirmée ! Vous recevrez un e-mail de confirmation."
          );
          setFormData({ name: "", date: "", time: "", guests: 1 });
        };

        return (
          <section id="reservation" className="pt-24 pb-12 min-h-screen">
            <div className="container mx-auto px-4">
              <h2 className="text-4xl font-extrabold text-center mb-8 section-title">
                Réservez une table
              </h2>
              <div className="card p-8 rounded-xl max-w-md mx-auto">
                <form onSubmit={handleSubmit}>
                  <div className="mb-4">
                    <label className="block mb-2 text-gray-800 font-semibold">
                      Nom
                    </label>
                    <input
                      type="text"
                      name="name"
                      value={formData.name}
                      onChange={handleChange}
                      className="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:border-blue-500"
                      required
                    />
                  </div>
                  <div className="mb-4">
                    <label className="block mb-2 text-gray-800 font-semibold">
                      Date
                    </label>
                    <input
                      type="date"
                      name="date"
                      value={formData.date}
                      onChange={handleChange}
                      className="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:border-blue-500"
                      required
                    />
                  </div>
                  <div className="mb-4">
                    <label className="block mb-2 text-gray-800 font-semibold">
                      Heure
                    </label>
                    <input
                      type="time"
                      name="time"
                      value={formData.time}
                      onChange={handleChange}
                      className="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:border-blue-500"
                      required
                    />
                  </div>
                  <div className="mb-4">
                    <label className="block mb-2 text-gray-800 font-semibold">
                      Nombre de personnes
                    </label>
                    <input
                      type="number"
                      name="guests"
                      value={formData.guests}
                      onChange={handleChange}
                      min="1"
                      className="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:border-blue-500"
                      required
                    />
                  </div>
                  <button
                    type="submit"
                    className="btn-primary text-white px-6 py-3 rounded-lg w-full"
                  >
                    Réserver
                  </button>
                  {message && (
                    <p className="mt-4 text-green-600 text-center">{message}</p>
                  )}
                </form>
              </div>
            </div>
          </section>
        );
      };

      const AuthModal = ({ setShowAuthModal, setUser }) => {
        const [email, setEmail] = useState("");
        const [password, setPassword] = useState("");
        const [error, setError] = useState("");

        const handleLogin = (e) => {
          e.preventDefault();
          if (email && password) {
            setUser({ email });
            setShowAuthModal(false);
          } else {
            setError("Veuillez remplir tous les champs.");
          }
        };

        return (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-20">
            <div className="card p-8 rounded-xl max-w-md w-full">
              <h2 className="text-2xl font-bold mb-4 text-blue-800">
                Connexion
              </h2>
              <form onSubmit={handleLogin}>
                <div className="mb-4">
                  <label className="block mb-2 text-gray-800 font-semibold">
                    Email
                  </label>
                  <input
                    type="email"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    className="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:border-blue-500"
                    required
                  />
                </div>
                <div className="mb-4">
                  <label className="block mb-2 text-gray-800 font-semibold">
                    Mot de passe
                  </label>
                  <input
                    type="password"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    className="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:border-blue-500"
                    required
                  />
                </div>
                {error && <p className="text-red-500 mb-4">{error}</p>}
                <button
                  type="submit"
                  className="btn-primary text-white px-6 py-3 rounded-lg w-full"
                >
                  Se connecter
                </button>
                <button
                  type="button"
                  onClick={() => setShowAuthModal(false)}
                  className="mt-2 text-gray-600 hover:text-gray-800 w-full text-center"
                >
                  Annuler
                </button>
              </form>
            </div>
          </div>
        );
      };

      const App = () => {
        const [currentPage, setCurrentPage] = useState("home");
        const [cart, setCart] = useState([]);
        const [user, setUser] = useState(null);
        const [showAuthModal, setShowAuthModal] = useState(false);

        const addToCart = (item) => {
          setCart([...cart, item]);
        };

        const removeFromCart = (index) => {
          setCart(cart.filter((_, i) => i !== index));
        };

        const submitOrder = () => {
          if (cart.length === 0) {
            alert("Votre panier est vide !");
            return;
          }
          alert("Commande passée avec succès !");
          setCart([]);
        };

        return (
          <div>
            <Header setCurrentPage={setCurrentPage} />
            {currentPage === "home" && (
              <>
                <Home />
                <Cart
                  cart={cart}
                  removeFromCart={removeFromCart}
                  user={user}
                  setShowAuthModal={setShowAuthModal}
                  submitOrder={submitOrder}
                />
              </>
            )}
            {currentPage === "menu" && <Menu addToCart={addToCart} />}
            {currentPage === "reservation" && <Reservation />}
            {showAuthModal && (
              <AuthModal
                setShowAuthModal={setShowAuthModal}
                setUser={setUser}
              />
            )}
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
